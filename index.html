<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A<3S</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #9d4edd; --pudra: #fbe4e8; --glass: rgba(255, 255, 255, 0.6); }
        body { background-color: var(--pudra); color: #4a4a4a; font-family: 'Poppins', sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        /* Arka Plan */
        .heart-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .floating-heart { position: absolute; color: var(--accent); opacity: 0.6; animation: float 10s infinite linear; }
        @keyframes float { 0% { transform: translateY(110vh); opacity: 0; } 100% { transform: translateY(-10vh); opacity: 0; } }

        header { text-align: center; padding: 40px 20px; z-index: 1; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 3.5rem; margin: 0; color: var(--accent); }
        .counter-box { background: var(--glass); padding: 10px 25px; border-radius: 50px; border: 1px solid var(--accent); margin-top: 10px; display: inline-block; font-weight: 600; color: #6a1b9a; }

        .controls { width: 95%; max-width: 1100px; display: flex; justify-content: flex-end; margin-bottom: 20px; z-index: 2; gap: 10px; }
        #sortOrder { padding: 8px; border-radius: 10px; border: 1px solid var(--accent); background: white; cursor: pointer; font-family: inherit; }

        /* Admin */
        .admin-box { display: none; width: 90%; max-width: 450px; background: white; padding: 25px; border-radius: 25px; border: 2px solid var(--accent); margin-bottom: 30px; z-index: 3; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }

        /* Kartlar */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; width: 95%; max-width: 1100px; padding-bottom: 120px; z-index: 1; }
        .card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative; }
        .slider { display: flex; overflow-x: auto; snap-type: x mandatory; height: 300px; background: #f0f0f0; }
        .slider img { flex: 0 0 100%; object-fit: cover; snap-align: start; }
        .card-body { padding: 20px; }
        .score { color: var(--accent); font-weight: 700; }

        /* Silme Tuşu */
        .delete-btn { display: none; position: absolute; top: 15px; right: 15px; background: rgba(255, 0, 0, 0.7); color: white; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; z-index: 10; font-weight: bold; }

        /* Müzik */
        .player { position: fixed; bottom: 20px; background: white; padding: 12px 30px; border-radius: 50px; border: 2px solid var(--accent); display: flex; align-items: center; gap: 25px; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .nav-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 1.5rem; display: flex; align-items: center; }
    </style>
</head>
<body>

    <div class="heart-bg" id="heartContainer"></div>

    <header>
        <h1>Alperen & Sümeyye</h1>
        <div id="dayCounter" class="counter-box">Dualarımızın Kabulünün ... Günü</div>
    </header>

    <div class="controls">
        <select id="sortOrder" onchange="loadMemories()">
            <option value="desc">Yeni Anılar Üstte</option>
            <option value="asc">Eski Anılar Üstte</option>
        </select>
    </div>

    <div id="adminPanel" class="admin-box">
        <h3 style="margin-top:0; color:var(--accent)">Yeni Anı ✨</h3>
        <input type="date" id="dateIn">
        <select id="scoreIn">
            <option value="10">Puan: 10</option><option value="9">Puan: 9</option>
            <option value="8">Puan: 8</option><option value="7">Puan: 7</option>
        </select>
        <textarea id="noteIn" rows="2" placeholder="Anlat bakalım..."></textarea>
        <p style="font-size:0.6rem; color:var(--accent); margin:0;">Fotoğrafları virgülle ayır: f1.jpg, f2.jpg</p>
        <input type="text" id="imgNameIn" placeholder="Görsel ad(lar)ı...">
        <button class="save-btn" onclick="saveData()">Sonsuzluğa İşle</button>
    </div>

    <div class="grid" id="memoryGrid"></div>

    <div class="player">
        <button class="nav-btn" onclick="prevSong()">⏮️</button>
        <button class="nav-btn" onclick="toggleMusic()" id="pBtn" style="font-size: 2rem;">▶️</button>
        <button class="nav-btn" onclick="nextSong()">⏭️</button>
        <audio id="audio" loop></audio>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAs8OjsMXX9UKx3K9eG2ZIBYo1pOTxbv3Y",
            authDomain: "a-s-sonsuzluk.firebaseapp.com",
            projectId: "a-s-sonsuzluk",
            storageBucket: "a-s-sonsuzluk.firebasestorage.app",
            messagingSenderId: "709661861259",
            appId: "1:709661861259:web:80bf08213dc7b0ba727b8e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const isAdmin = new URLSearchParams(window.location.search).get('ask') === '15032006';

        // 10 Şarkılık Playlist
        const playlist = Array.from({length: 10}, (_, i) => `sarki-${i+1}.mp3`);
        let currentSongIdx = 0;
        const audio = document.getElementById('audio');
        function loadSong(idx) { audio.src = playlist[idx]; }
        function toggleMusic() { 
            const btn = document.getElementById('pBtn');
            audio.paused ? (audio.play(), btn.innerText="⏸️") : (audio.pause(), btn.innerText="▶️");
        }
        function nextSong() { currentSongIdx = (currentSongIdx + 1) % playlist.length; loadSong(currentSongIdx); audio.play(); pBtn.innerText="⏸️"; }
        function prevSong() { currentSongIdx = (currentSongIdx - 1 + playlist.length) % playlist.length; loadSong(currentSongIdx); audio.play(); pBtn.innerText="⏸️"; }
        loadSong(currentSongIdx);

        // Sayaç & Kalpler
        const start = new Date("2026-02-15");
        setInterval(() => {
            const diff = Math.floor((new Date() - start) / (1000*60*60*24));
            document.getElementById('dayCounter').innerText = `Dualarımızın Kabulünün ${diff}. Günü`;
        }, 1000);

        if(isAdmin) {
            document.getElementById('adminPanel').style.display = 'block';
            document.body.insertAdjacentHTML('beforeend', '<style>.delete-btn { display: block !important; }</style>');
        }

        async function saveData() {
            const d = document.getElementById('dateIn').value;
            const s = document.getElementById('scoreIn').value;
            const n = document.getElementById('noteIn').value;
            const i = document.getElementById('imgNameIn').value;
            if(!d || !n || !i) return alert("Eksik bilgi! ❤️");
            try {
                await db.collection("gunluk").add({ tarih: d, puan: s, not: n, gorsel: i, created: firebase.firestore.FieldValue.serverTimestamp() });
                confetti({ particleCount: 150 }); location.reload();
            } catch(e) { alert(e.message); }
        }

        // SİLME FONKSİYONU
        async function deleteMemory(id) {
            if(confirm("Bu anıyı silmek istediğinizden emin misiniz?")) {
                try {
                    await db.collection("gunluk").doc(id).delete();
                    alert("Anı silindi.");
                    location.reload();
                } catch(e) { alert("Hata oluştu!"); }
            }
        }

        let unsubscribe;
        function loadMemories() {
            const order = document.getElementById('sortOrder').value;
            const grid = document.getElementById('memoryGrid');
            if (unsubscribe) unsubscribe();
            unsubscribe = db.collection("gunluk").orderBy("tarih", order).onSnapshot(ss => {
                grid.innerHTML = "";
                if(order === 'asc') addFirstDay(grid);
                ss.forEach(doc => {
                    const d = doc.data();
                    const slider = d.gorsel.split(',').map(p => `<img src="${p.trim()}">`).join('');
                    grid.insertAdjacentHTML('beforeend', `
                        <div class="card">
                            <button class="delete-btn" onclick="deleteMemory('${doc.id}')">X</button>
                            <div class="slider">${slider}</div>
                            <div class="card-body">
                                <div style="display:flex; justify-content:space-between; font-size:0.8rem;">
                                    <span>${d.tarih}</span> <span class="score">${d.puan}/10</span>
                                </div>
                                <p style="margin-top:10px;">${d.not}</p>
                            </div>
                        </div>`);
                });
                if(order === 'desc') addFirstDay(grid);
            });
        }

        function addFirstDay(grid) {
            grid.insertAdjacentHTML('beforeend', `<div class="card"><div class="slider"><img src="ilk.png"></div><div class="card-body"><div style="display:flex; justify-content:space-between; font-size:0.8rem;"><span>2026-02-15</span> <span class="score">10/10</span></div><p style="margin-top:10px;">Dualarımızın kabul olduğu o ilk gün... ❤️</p></div></div>`);
        }
        loadMemories();
    </script>
</body>
</html>
